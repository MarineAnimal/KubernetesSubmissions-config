apiVersion: batch/v1
kind: CronJob
metadata:
  name: todo-db-backup
  labels:
    app: todo-app
spec:
  schedule: "0 0 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: todo-db-backup-sa
          restartPolicy: OnFailure
          containers:
            - name: todo-db-backup
              image: google/cloud-sdk:slim
              env:
                - name: POSTGRES_HOST
                  value: todo-postgres
                - name: POSTGRES_PORT
                  value: "5432"
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: todo-db-secret
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: todo-db-secret
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: todo-db-secret
                      key: POSTGRES_PASSWORD
                - name: GCS_BUCKET
                  value: dwk-gke-501611-todo-backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              command:
                - /bin/sh
                - -c
                - |
                  apt-get update && apt-get install -y postgresql-client && \
                  PGPASSWORD="$POSTGRES_PASSWORD" pg_dump -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" "$POSTGRES_DB" > /tmp/todo-backup.sql && \
                  gsutil cp /tmp/todo-backup.sql "gs://$GCS_BUCKET/todo-backup-$(date +%Y%m%d%H%M%S).sql"