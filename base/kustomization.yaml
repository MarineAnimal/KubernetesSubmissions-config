apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - persistentvolumeclaim.yaml
  - postgres.yaml
  - nats.yaml
  - deployment-broadcaster.yaml
  - deployment-log-output.yaml
